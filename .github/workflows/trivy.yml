name: trivy

on:
  pull_request:
  push:
    branches:
      - "main"
      - "dev"
  schedule:
    - cron: "0 3 * * *" # Daily at 03:00 UTC

jobs:
  trivy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # Required to upload SARIF results to the GitHub Security tab
    if: github.event_name != 'schedule' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    steps:
      - uses: it-at-m/lhm_actions/action-templates/actions/action-trivy@b088b94cad35e50b197104c9e2ac8fb25a7116b3 # v1.0.33
